title: INCTN
url: "https://inctn.it"
baseurl: ""
google_analytics_key: ""
google_maps_javascript_api_key:
disqus_shortname:

logo: /siteicon.png
description: "Website of the Italian Network for Computational and Theoretical Neuroscience."

author:
  name: INCTN
  email: info@inctn.it
  twitter:

social:
  name: INCTN
  links: []

timezone: Europe/Rome
permalink: pretty

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-paginate

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENCE

collections:
  speakers:
    _hide_content: true
  organizers:
    _hide_content: true

paginate: 10
paginate_path: "/blog/:num/"

jekyll-archives:
  enabled: ['categories']

defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      type: "posts"
    values:
      layout: "post"
      _options:
        image:
          width: 2000
          height: 1322
          resize_style: cover
        content:
          width: 1500
          height: 2000
  -
    scope:
      path: "contact-success.html"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "pages"
    values:
      image:
        width: 2000
        height: 1322
        resize_style: cover
      bottom_image:
        width: 2000
        height: 1322
        resize_style: cover

# -----------
# CloudCannon

social_icons:
  - Facebook
  - Google Plus
  - Instagram
  - LinkedIn
  - Pinterest
  - Tumblr
  - Twitter
  - YouTube
  - Email
  - RSS

_comments:
  description: #Text shown when sharing on social media
  blurb: #Short bio or description of this person
